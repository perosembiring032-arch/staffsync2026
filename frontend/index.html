<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STAFF ANG — Staff Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A0E1A;color:#E2E8F0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .logo{font-family:'Bebas Neue';font-size:64px;letter-spacing:4px;background:linear-gradient(135deg,#6366F1,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
    .sub{font-family:'JetBrains Mono';font-size:12px;color:#475569;letter-spacing:2px;margin-bottom:48px}
    .btn{display:inline-block;padding:14px 32px;border-radius:12px;font-family:'JetBrains Mono';font-size:13px;font-weight:700;text-decoration:none;letter-spacing:1px;transition:all .2s}
    .btn-staff{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;margin-right:12px}
    .btn-admin{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#94A3B8}
    .btn:hover{transform:translateY(-2px);opacity:.9}
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="logo">STAFF ANG</div>
    <div class="sub">STAFF MONITORING SYSTEM</div>
    <a href="/staff/index.html" class="btn btn-staff">🧑‍💼 Portal Staff</a>
    <a href="/admin/index.html" class="btn btn-admin">⚙️ Portal Admin</a>
  </div>
</body>
</html>
